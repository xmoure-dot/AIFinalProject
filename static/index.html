<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Βοηθός Μελέτης</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 24px; }
    header h1 { font-size: 20px; font-weight: 600; color: #a78bfa; }
    header span { font-size: 13px; color: #64748b; margin-left: auto; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #1a1d2e;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }

    .sidebar h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }

    .upload-area {
      border: 2px dashed #3d4166;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-area:hover, .upload-area.drag { border-color: #7c3aed; background: #1e1b3a; }
    .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-area p { font-size: 13px; color: #94a3b8; }
    .upload-area input { display: none; }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-danger { background: #991b1b; color: #fff; font-size: 12px; padding: 6px 10px; width: auto; }
    .btn-danger:hover { background: #7f1d1d; }

    #upload-status { font-size: 13px; color: #94a3b8; min-height: 18px; }
    #upload-status.success { color: #34d399; }
    #upload-status.error { color: #f87171; }

    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item {
      background: #12141f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cbd5e1; }
    .doc-item .doc-icon { font-size: 16px; flex-shrink: 0; }
    .empty-docs { font-size: 13px; color: #475569; text-align: center; padding: 12px 0; }

    /* ── Chat ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: #475569;
      text-align: center;
    }
    .welcome .big-icon { font-size: 56px; }
    .welcome h2 { font-size: 20px; color: #64748b; }
    .welcome p { font-size: 14px; max-width: 360px; }

    .msg { display: flex; gap: 12px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.user .bubble { background: #7c3aed; color: #fff; border-radius: 18px 18px 4px 18px; }
    .msg.bot .bubble { background: #1e2030; border: 1px solid #2d3148; border-radius: 18px 18px 18px 4px; }

    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: #12141f;
      border: 1px solid #2d3148;
    }

    .bubble {
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.6;
      max-width: 680px;
    }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sources-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .source-chip {
      background: #12141f;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: #94a3b8;
    }
    .source-chip strong { color: #a78bfa; }

    .typing { display: flex; align-items: center; gap: 6px; padding: 12px 16px; }
    .dot { width: 8px; height: 8px; background: #7c3aed; border-radius: 50%; animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

    /* ── Input ── */
    .input-bar {
      padding: 16px 32px 20px;
      background: #0f1117;
      border-top: 1px solid #1e2030;
    }
    .input-row {
      display: flex;
      gap: 10px;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 10px 14px;
      align-items: flex-end;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: #7c3aed; }
    #question {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }
    #question::placeholder { color: #475569; }
    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 9px;
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
    }
    #send-btn:hover:not(:disabled) { background: #6d28d9; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .progress-bar-wrap { width: 100%; background: #2d3148; border-radius: 4px; overflow: hidden; height: 4px; margin-top: 8px; }
    .progress-bar { height: 4px; background: #7c3aed; width: 0%; transition: width .3s; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🎓</span>
  <h1>Βοηθός Μελέτης</h1>
  <span>ανέβασε σημειώσεις και κάνε ερωτήσεις</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Έγγραφα</h2>

    <div class="upload-area" id="drop-zone">
      <div class="icon">📄</div>
      <p>Σύρε ή κλικ για ανέβασμα<br><small>PDF, TXT, MD — έως 20 MB</small></p>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" multiple />
    </div>
    <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p id="upload-status"></p>

    <h2>Ανεβασμένα αρχεία</h2>
    <div class="doc-list" id="doc-list">
      <p class="empty-docs">Δεν υπάρχουν έγγραφα ακόμα.</p>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="big-icon">🤖</div>
        <h2>Ξεκίνα ανεβάζοντας ένα αρχείο</h2>
        <p>Ανέβασε τις σημειώσεις σου και μετά ρώτα ό,τι θέλεις.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea id="question" rows="1" placeholder="Κάνε μια ερώτηση για τα έγγραφά σου…"></textarea>
        <button id="send-btn" title="Αποστολή">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';

// ── Auto-resize textarea ──
const textarea = document.getElementById('question');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

// ── Upload ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const uploadStatus = document.getElementById('upload-status');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  uploadFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => { uploadFiles([...fileInput.files]); fileInput.value = ''; });

async function uploadFiles(files) {
  for (const file of files) {
    setStatus(`Ανέβασμα: ${file.name}…`, '');
    progressWrap.style.display = 'block';
    progressBar.style.width = '30%';

    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`${API}/documents/upload`, { method: 'POST', body: fd });
      progressBar.style.width = '100%';
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Σφάλμα');
      setStatus(`✓ ${file.name} (${data.chunks_indexed} τμήματα)`, 'success');
    } catch (err) {
      setStatus(`✗ ${err.message}`, 'error');
    } finally {
      setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 800);
    }
  }
  loadDocuments();
}

function setStatus(msg, cls) {
  uploadStatus.textContent = msg;
  uploadStatus.className = cls;
}

// ── Documents list ──
async function loadDocuments() {
  const res = await fetch(`${API}/documents`);
  const docs = await res.json();
  const list = document.getElementById('doc-list');
  if (!docs.length) {
    list.innerHTML = '<p class="empty-docs">Δεν υπάρχουν έγγραφα ακόμα.</p>';
    return;
  }
  list.innerHTML = docs.map(d => `
    <div class="doc-item">
      <span class="doc-icon">${d.source_file.endsWith('.pdf') ? '📕' : '📄'}</span>
      <span class="doc-name" title="${d.source_file}">${d.source_file}</span>
      <button class="btn btn-danger" onclick="deleteDoc('${d.doc_id}')">✕</button>
    </div>`).join('');
}

async function deleteDoc(id) {
  await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
  loadDocuments();
}

// ── Chat ──
async function sendQuestion() {
  const q = textarea.value.trim();
  if (!q) return;
  textarea.value = '';
  textarea.style.height = 'auto';

  document.getElementById('welcome')?.remove();

  appendMsg('user', q);
  const typingEl = appendTyping();
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    typingEl.remove();
    if (!res.ok) throw new Error(data.detail || 'Σφάλμα');
    appendAnswer(data.answer, data.sources);
  } catch (err) {
    typingEl.remove();
    appendMsg('bot', `⚠️ ${err.message}`);
  } finally {
    document.getElementById('send-btn').disabled = false;
    textarea.focus();
  }
}

document.getElementById('send-btn').addEventListener('click', sendQuestion);

function appendMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="bubble">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendAnswer(answer, sources) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';

  let sourcesHtml = '';
  if (sources && sources.length) {
    const unique = [...new Map(sources.map(s => [s.doc_id, s])).values()];
    sourcesHtml = `<div class="sources">
      <div class="sources-label">Πηγές</div>
      ${unique.map(s => `<div class="source-chip"><strong>${escHtml(s.source_file)}</strong>${s.page != null ? ` — σελ. ${s.page + 1}` : ''}<br><small>${escHtml(s.excerpt)}</small></div>`).join('')}
    </div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="bubble">${escHtml(answer)}${sourcesHtml}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

loadDocuments();
</script>
</body>
</html>
